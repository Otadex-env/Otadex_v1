name: otadex
description: The Ultimate Anime Character Encyclopedia
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # Fonts
  google_fonts: ^6.1.0

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Storage local
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0

  # UI & Animations
  smooth_page_indicator: ^1.1.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0

  # Assets & Images
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.0

  # Auth & Storage
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0
  google_sign_in: ^6.2.0

  # HTTP client (AniList GraphQL)
  http: ^1.2.0

  # Utils
  gap: ^3.0.1
  url_launcher: ^6.2.0

  # Media
  image_picker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo/
    - assets/images/onboarding/
    - assets/images/splash/
    - assets/data/
    - assets/images/Animé pictures/Jujutsu kaizen/Aoi Todo/
    - assets/images/Animé pictures/Jujutsu kaizen/Chojo Kamo/
    - assets/images/Animé pictures/Jujutsu kaizen/Gojo satoru/
    - assets/images/Animé pictures/Jujutsu kaizen/hiromi higumura/
    - assets/images/Animé pictures/Jujutsu kaizen/Kenjaku/
    - assets/images/Animé pictures/Jujutsu kaizen/Mahito/
    - assets/images/Animé pictures/Jujutsu kaizen/Maki Zenin/
    - assets/images/Animé pictures/Jujutsu kaizen/Megumi Fushiguro/
    - assets/images/Animé pictures/Jujutsu kaizen/Nanami Kento/
    - assets/images/Animé pictures/Jujutsu kaizen/Suguru Geto/
    - assets/images/Animé pictures/Jujutsu kaizen/Sukuna/
    - assets/images/Animé pictures/Jujutsu kaizen/Toge Inumaki/
    - assets/images/Animé pictures/Jujutsu kaizen/Toji fushiguro/
    - assets/images/Animé pictures/Jujutsu kaizen/Yuji Itadori/
    - assets/images/Animé pictures/Jujutsu kaizen/Yuta Okkotsu/
    - assets/images/Animé pictures/Naruto Shippuden/Minato Namikaze/

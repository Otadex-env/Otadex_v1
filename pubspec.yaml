name: otadex
description: The Ultimate Anime Character Encyclopedia
publish_to: "none"
version: 1.5.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # Fonts
  google_fonts: ^8.0.0

  # State Management
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0

  # Storage local
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.2.0

  # UI & Animations
  smooth_page_indicator: ^1.1.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0

  # Assets & Images
  cached_network_image: ^3.4.0
  flutter_svg: ^2.2.0

  # Auth & Storage
  firebase_core: ^3.15.0
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  google_sign_in: ^6.3.0

  # HTTP client (AniList GraphQL)
  http: ^1.2.0

  # Utils
  gap: ^3.0.1
  url_launcher: ^6.2.0
  flutter_dotenv: ^5.2.0

  # Media
  image_picker: ^1.1.0

  # Notifications
  onesignal_flutter: ^5.5.0

  # Voice search
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.6.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/logo/
    - assets/images/onboarding/
    - assets/images/splash/
    - assets/data/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/logo/otadex_icon_small_transparent.png"
  adaptive_icon_background: "#0D0D14"
  adaptive_icon_foreground: "assets/images/logo/otadex_icon_small_transparent.png"
  min_sdk_android: 21

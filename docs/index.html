<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OTADEX — Pages légales</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0D0D14;
      --card: #1A1A28;
      --accent: #FF6500;
      --text: #E8E8F0;
      --muted: #9090A0;
      --border: #2A2A3A;
    }
    body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    header { text-align: center; margin-bottom: 48px; }
    .logo { font-size: 32px; font-weight: 900; letter-spacing: 4px; color: var(--accent); }
    .tagline { font-size: 13px; color: var(--muted); margin-top: 8px; letter-spacing: 1px; }
    .cards { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 480px; }
    a.card {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px 24px;
      text-decoration: none; color: var(--text);
      transition: border-color .2s, background .2s;
    }
    a.card:hover { border-color: var(--accent); background: #20202E; }
    .card-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .card-sub { font-size: 12px; color: var(--muted); }
    .arrow { color: var(--accent); font-size: 18px; }
    footer { margin-top: 48px; font-size: 12px; color: var(--muted); text-align: center; }
  </style>
</head>
<body>
  <header>
    <div class="logo">OTADEX</div>
    <div class="tagline">Informations légales · Legal information</div>
  </header>
  <div class="cards">
    <a class="card" href="privacy-policy.html">
      <div>
        <div class="card-title">Politique de confidentialité</div>
        <div class="card-sub">Privacy Policy · FR / EN</div>
      </div>
      <span class="arrow">→</span>
    </a>
    <a class="card" href="terms.html">
      <div>
        <div class="card-title">Conditions d'utilisation</div>
        <div class="card-sub">Terms of Service · FR / EN</div>
      </div>
      <span class="arrow">→</span>
    </a>
    <a class="card" href="account-deletion.html">
      <div>
        <div class="card-title">Suppression de compte</div>
        <div class="card-sub">Account Deletion · FR / EN</div>
      </div>
      <span class="arrow">→</span>
    </a>
  </div>
  <footer>TilStack · contact@otadex.app</footer>
</body>
</html>
